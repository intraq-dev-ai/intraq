name: Feature request
description: Suggest an improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please keep feature requests focused on the public source scope. Paid AI Studio, proprietary domain packs, multi-tenant governance, billing, managed service tooling, and private operational code are outside this repository.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Analyzer
        - Dashboard Builder
        - SQL Editor
        - Data Sources
        - MCP
        - Setup / Deployment
        - Documentation
        - Other
    validations:
      required: true
